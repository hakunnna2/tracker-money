<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="description" content="Smart personal finance manager with MAD budgeting, account tracking, and transaction history" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FinancialCopilot" />
    <meta name="application-name" content="Smart Financial Copilot" />
    
    <!-- Android PWA Meta Tags -->
    <meta name="theme-color" content="#3b82f6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1e40af" media="(prefers-color-scheme: dark)" />
    
    <!-- iOS Meta Tags -->
    <link rel="apple-touch-icon" href="/icons/icon-192-v2.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192-v2.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest?v=20260418-2" />
    
    <!-- Title -->
    <title>Smart Financial Copilot</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js?v=20260418-2').then(
            reg => {
              console.log('Service Worker registered', reg);
              reg.update();

              if (reg.waiting) {
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
              }

              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (!newWorker) return;

                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });

              let reloading = false;
              navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (reloading) return;
                reloading = true;
                window.location.reload();
              });
            },
            err => console.log('Service Worker registration failed', err)
          );
        });
      }

      // Prevent double tap zoom on mobile
      document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });
    </script>
  </body>
</html>
